# REFERENCE ONLY — this file was used in standalone mode and is no longer mounted.
# APISIX now runs in etcd mode. All routes, upstreams, consumers, and plugins
# must be created via the Dashboard GUI at http://localhost:9000 (admin / admin).
# Use the config below as a reference when recreating them in the Dashboard.
#
# Upstreams to create in Dashboard → Upstream:
#   1. auth-service  → http://auth-service:3001
#   2. ai-service    → http://ai-service:3002
#   3. web-app       → http://web-app:3000
#
# Consumer to create in Dashboard → Consumer:
#   username: dattoapp
#   plugin: jwt-auth  key: dattoapp  secret: <your JWT_SECRET>  algorithm: HS256
#
# Routes to create in Dashboard → Route (in this order — most specific first):
#   /api/auth/*       → auth-service  (no JWT required)
#   /api/chat         → ai-service    (jwt-auth + serverless-post-function to inject headers)
#   /api/history      → ai-service    (jwt-auth + serverless-post-function)
#   /api/history/*    → ai-service    (jwt-auth + serverless-post-function)
#   /api/tools        → ai-service    (jwt-auth + serverless-post-function)
#   /api/approvals/*  → ai-service    (jwt-auth + serverless-post-function)
#   /api/admin/*      → ai-service    (jwt-auth + serverless-post-function)
#   /api/debug/*      → ai-service    (jwt-auth + serverless-post-function)
#   /*                → web-app       (no auth — catch-all)
#
# serverless-post-function Lua code (same for all protected routes):
#   return function(conf, ctx)
#     local auth = ngx.req.get_headers()["authorization"]
#     if not auth then return end
#     local token = auth:match("Bearer (.+)")
#     if not token then return end
#     local parts = {}
#     for p in token:gmatch("[^%.]+") do parts[#parts+1] = p end
#     if #parts < 2 then return end
#     local b64 = parts[2]:gsub("%-","+"):gsub("_","/")
#     local pad = 4 - #b64 % 4
#     if pad < 4 then b64 = b64 .. string.rep("=", pad) end
#     local dec = ngx.decode_base64(b64)
#     if not dec then return end
#     local cjson = require("cjson.safe")
#     local pl = cjson.decode(dec)
#     if not pl then return end
#     ngx.req.set_header("X-User-Id", pl.sub or "")
#     ngx.req.set_header("X-User-Role", pl.role or "")
#   end
# ---------------------------------------------------------------------------

# Upstreams (internal Docker hostnames)
upstreams:
  - id: 1
    name: auth-service
    type: roundrobin
    nodes:
      "auth-service:5001": 1
  - id: 2
    name: ai-service
    type: roundrobin
    nodes:
      "ai-service:6001": 1
  - id: 3
    name: web-app
    type: roundrobin
    nodes:
      "web-app:3000": 1

# Consumer for JWT verification (secret must match JWT_SECRET used by auth-service)
consumers:
  - username: dattoapp
    plugins:
      jwt-auth:
        key: dattoapp
        secret: dev-secret-change-in-production
        algorithm: HS256

# Shared inject function: decode JWT and set X-User-Id / X-User-Role headers
# jwt-auth validates the token; this function decodes the payload manually
# (ctx.jwt_auth_payload is not reliably available in serverless-post-function)

routes:
  # Auth: login (no JWT), verify — rate-limited to prevent brute-force (SEC-006)
  - uri: /api/auth/*
    upstream_id: 1
    methods: [GET, POST]
    name: auth-route
    plugins:
      limit-req:
        rate: 5       # 5 req/s sustained
        burst: 10     # allow brief bursts
        key: remote_addr
        rejected_code: 429

  # Chat & history: require JWT, inject X-User-Id and X-User-Role
  - uri: /api/chat
    upstream_id: 2
    methods: [POST]
    name: chat-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\") end"

  - uri: /api/history
    upstream_id: 2
    methods: [GET]
    name: history-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\") end"

  - uri: /api/history/*
    upstream_id: 2
    methods: [GET]
    name: history-id-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\") end"

  - uri: /api/admin/*
    upstream_id: 2
    methods: [GET, POST]
    name: admin-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\") end"

  # Debug: trace viewer (last N chat calls — requires login)
  - uri: /api/debug/*
    upstream_id: 2
    methods: [GET]
    name: debug-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\") end"

  # Web app (Next.js) — catch-all
  - uri: /*
    upstream_id: 3
    name: web-app-route
#END
