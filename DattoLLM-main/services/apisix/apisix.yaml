        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; local jti = pl.jti; if jti then local redis = require(\"resty.redis\"); local red = redis:new(); red:set_timeouts(500, 500, 500); local ok = red:connect(\"redis\", 6379); if ok then local exists = red:exists(\"revoked_jtis:\" .. jti); red:set_keepalive(10000, 100); if exists == 1 then ngx.status = ngx.HTTP_UNAUTHORIZED; ngx.header[\"Content-Type\"] = \"application/json\"; ngx.say(\"{\\\"error\\\":\\\"token_revoked\\\"}\"); return ngx.exit(ngx.HTTP_UNAUTHORIZED) end end end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\"); ngx.req.set_header(\"X-Allowed-Tools\", cjson.encode(pl.allowed_tools or {})) end"

