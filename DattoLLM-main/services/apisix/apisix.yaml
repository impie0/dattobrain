# REFERENCE ONLY — this file was used in standalone mode and is no longer mounted.
# APISIX now runs in etcd mode. All routes, upstreams, consumers, and plugins
# must be created via the Dashboard GUI at http://localhost:9000 (admin / admin).
# Use the config below as a reference when recreating them in the Dashboard.
#
# Upstreams to create in Dashboard → Upstream:
#   1. auth-service  → http://auth-service:5001
#   2. ai-service    → http://ai-service:6001
#   3. web-app       → http://web-app:3000
#
# Consumer to create in Dashboard → Consumer:
#   username: dattoapp
#   plugin: jwt-auth  key: dattoapp  algorithm: RS256
#   public_key: <contents of JWT_PUBLIC_KEY from .env, PEM format>
#   (RS256 — the auth-service signs with the private key; APISIX verifies with public key only)
#
# Routes to create in Dashboard → Route (in this order — most specific first):
#   /api/auth/*       → auth-service  methods: GET,POST  (no JWT required, rate-limited: 5 req/s burst 10)
#   /api/chat         → ai-service    methods: POST       (jwt-auth + serverless-post-function)
#   /api/chat/mode    → ai-service    methods: POST       (jwt-auth + serverless-post-function)
#   /api/history      → ai-service    methods: GET        (jwt-auth + serverless-post-function)
#   /api/history/*    → ai-service    methods: GET        (jwt-auth + serverless-post-function)
#   /api/tools        → ai-service    methods: GET        (jwt-auth + serverless-post-function)
#   /api/approvals/*  → ai-service    methods: GET,POST   (jwt-auth + serverless-post-function)
#   /api/proposals/*  → ai-service    methods: GET,POST   (jwt-auth + serverless-post-function)
#   /api/admin/*      → ai-service    methods: GET,POST,PUT,PATCH,DELETE  (jwt-auth + serverless-post-function)
#   /api/debug/*      → ai-service    methods: GET        (jwt-auth + serverless-post-function)
#   /chat             → ai-service    methods: POST       (jwt-auth + serverless-post-function — SSE streaming)
#   /*                → web-app       (no auth — catch-all)
#
# serverless-post-function Lua code (same for all protected routes):
#   Injects X-User-Id, X-User-Role, X-Allowed-Tools from decoded JWT payload.
#   SEC-002: Checks JTI revocation in Redis before passing the request downstream.
#   A revoked JTI returns 401 immediately, even if the JWT signature is valid.
#
#   return function(conf, ctx)
#     local auth = ngx.req.get_headers()["authorization"]
#     if not auth then return end
#     local token = auth:match("Bearer (.+)")
#     if not token then return end
#     local parts = {}
#     for p in token:gmatch("[^%.]+") do parts[#parts+1] = p end
#     if #parts < 2 then return end
#     local b64 = parts[2]:gsub("%-","+"):gsub("_","/")
#     local pad = 4 - #b64 % 4
#     if pad < 4 then b64 = b64 .. string.rep("=", pad) end
#     local dec = ngx.decode_base64(b64)
#     if not dec then return end
#     local cjson = require("cjson.safe")
#     local pl = cjson.decode(dec)
#     if not pl then return end
#     -- SEC-002: JTI revocation check
#     local jti = pl.jti
#     if jti then
#       local redis = require("resty.redis")
#       local red = redis:new()
#       red:set_timeouts(500, 500, 500)
#       local ok = red:connect("redis", 6379)
#       if ok then
#         local exists = red:exists("revoked_jtis:" .. jti)
#         red:set_keepalive(10000, 100)
#         if exists == 1 then
#           ngx.status = ngx.HTTP_UNAUTHORIZED
#           ngx.header["Content-Type"] = "application/json"
#           ngx.say("{\"error\":\"token_revoked\"}")
#           return ngx.exit(ngx.HTTP_UNAUTHORIZED)
#         end
#       end
#       -- Redis unavailable: allow request (fail-open) and rely on 1h token TTL
#     end
#     ngx.req.set_header("X-User-Id", pl.sub or "")
#     ngx.req.set_header("X-User-Role", pl.role or "")
#     ngx.req.set_header("X-Allowed-Tools", cjson.encode(pl.allowed_tools or {}))
#   end
#
# One-liner version for Dashboard (escape internal quotes with \"):
# ---------------------------------------------------------------------------

# Upstreams (internal Docker hostnames)
upstreams:
  - id: 1
    name: auth-service
    type: roundrobin
    nodes:
      "auth-service:5001": 1
  - id: 2
    name: ai-service
    type: roundrobin
    nodes:
      "ai-service:6001": 1
  - id: 3
    name: web-app
    type: roundrobin
    nodes:
      "web-app:3000": 1

# Consumer for JWT verification (RS256 — APISIX verifies with public key, never sees private key)
# In Dashboard: Consumer → dattoapp → jwt-auth plugin:
#   key: dattoapp, algorithm: RS256, public_key: <JWT_PUBLIC_KEY PEM>
consumers:
  - username: dattoapp
    plugins:
      jwt-auth:
        key: dattoapp
        algorithm: RS256
        # public_key: set in Dashboard — copy from JWT_PUBLIC_KEY env var

# Shared inject function: decode JWT payload → set X-User-Id, X-User-Role, X-Allowed-Tools
# SEC-002: Also checks revoked_jtis:<jti> in Redis before forwarding.
# jwt-auth validates RS256 signature + expiry; this function handles identity injection
# and revocation (ctx.jwt_auth_payload is not reliably available in serverless-post-function)

routes:
  # Auth: login (no JWT), verify — rate-limited to prevent brute-force (SEC-006)
  - uri: /api/auth/*
    upstream_id: 1
    methods: [GET, POST]
    name: auth-route
    plugins:
      limit-req:
        rate: 5       # 5 req/s sustained
        burst: 10     # allow brief bursts
        key: remote_addr
        rejected_code: 429

  # Chat & history: require JWT, inject X-User-Id and X-User-Role
  - uri: /api/chat
    upstream_id: 2
    methods: [POST]
    name: chat-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; local jti = pl.jti; if jti then local redis = require(\"resty.redis\"); local red = redis:new(); red:set_timeouts(500, 500, 500); local ok = red:connect(\"redis\", 6379); if ok then local exists = red:exists(\"revoked_jtis:\" .. jti); red:set_keepalive(10000, 100); if exists == 1 then ngx.status = ngx.HTTP_UNAUTHORIZED; ngx.header[\"Content-Type\"] = \"application/json\"; ngx.say(\"{\\\"error\\\":\\\"token_revoked\\\"}\"); return ngx.exit(ngx.HTTP_UNAUTHORIZED) end end end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\"); ngx.req.set_header(\"X-Allowed-Tools\", cjson.encode(pl.allowed_tools or {})) end"

  - uri: /api/history
    upstream_id: 2
    methods: [GET]
    name: history-route
    plugins:
      jwt-auth:
        header: authorization
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx) local auth = ngx.req.get_headers()[\"authorization\"]; if not auth then return end; local token = auth:match(\"Bearer (.+)\"); if not token then return end; local parts = {}; for p in token:gmatch(\"[^%.]+\") do parts[#parts+1] = p end; if #parts < 2 then return end; local b64 = parts[2]:gsub(\"%-\",\"+\"):gsub(\"_\",\"/\"); local pad = 4 - #b64 % 4; if pad < 4 then b64 = b64 .. string.rep(\"=\", pad) end; local dec = ngx.decode_base64(b64); if not dec then return end; local cjson = require(\"cjson.safe\"); local pl = cjson.decode(dec); if not pl then return end; local jti = pl.jti; if jti then local redis = require(\"resty.redis\"); local red = redis:new(); red:set_timeouts(500, 500, 500); local ok = red:connect(\"redis\", 6379); if ok then local exists = red:exists(\"revoked_jtis:\" .. jti); red:set_keepalive(10000, 100); if exists == 1 then ngx.status = ngx.HTTP_UNAUTHORIZED; ngx.header[\"Content-Type\"] = \"application/json\"; ngx.say(\"{\\\"error\\\":\\\"token_revoked\\\"}\"); return ngx.exit(ngx.HTTP_UNAUTHORIZED) end end end; ngx.req.set_header(\"X-User-Id\", pl.sub or \"\"); ngx.req.set_header(\"X-User-Role\", pl.role or \"\"); ngx.req.set_header(\"X-Allowed-Tools\", cjson.encode(pl.allowed_tools or {})) end"

