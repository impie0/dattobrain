conf:
  listen:
    host: 0.0.0.0
    port: 9000
  allow_list:
    - 0.0.0.0/0
  etcd:
    endpoints:
      - "etcd:2379"
    prefix: "/apisix"
    timeout: 30

# IMPORTANT: Change the admin password before first use.
# After changing, restart apisix-dashboard for it to take effect.
authentication:
  secret: change-me-in-production
  expire_time: 3600
  users:
    - username: admin
      password: admin
