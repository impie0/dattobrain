apisix:
  node_listen: 9080
  enable_ipv6: false

plugin_attr:
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"
    sample_ratio: 1
    service_name: "apisix"

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30
  admin:
    admin_listen:
      port: 9180
    allow_admin:
      - 0.0.0.0/0
    admin_key:
      - name: admin
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
