# PgBouncer configuration — SEC-010
# IMPORTANT: pool_mode MUST be "session" — advisory locks (pg_try_advisory_lock) used
# in ai-service/src/sync.ts are session-scoped. Transaction mode would break them by
# returning the connection to the pool between statements, potentially assigning a
# different server connection for the unlock query.

[databases]
# datto_rmm — auth-service and ai-service
datto_rmm = host=postgres port=5432 dbname=datto_rmm
# litellm — LiteLLM internal tracking DB
litellm = host=postgres port=5432 dbname=litellm

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

# Session mode — required for pg_advisory_lock/pg_advisory_unlock (sync.ts SEC-011)
# To use transaction mode in future, move advisory locks to explicit-transaction form
# with pg_try_advisory_xact_lock (auto-released at transaction end).
pool_mode = session

# Auth: trust within the Docker internal network.
# The network boundary (internal bridge) is the security layer in dev.
# For production: switch to auth_type = scram-sha-256 and use a hashed userlist.
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

# Connection pool sizing
max_client_conn = 100
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

# Server-side cleanup on connection return
server_reset_query = DISCARD ALL

# Connection limits
server_idle_timeout = 600
client_idle_timeout = 0

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# Admin access (stats, reload)
admin_users = postgres
