# Datto RMM AI Platform — local dev
# Run: docker compose up --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: datto_rmm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datto_rmm"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build:
      context: ./read-only-mcp
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: 3001
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-bridge:
    # SEC-MCP-001: Read-only MCP bridge. When write tools arrive, split into mcp-write
    # with separately scoped Datto credentials to preserve the isolation guarantee.
    build:
      context: ./mcp-bridge
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: 4001
      MCP_SERVER_URL: http://mcp-server:3001
      AUTH_SERVICE_URL: http://auth-service:5001  # SEC-MCP-001: introspect to verify permissions
    networks:
      - internal
    depends_on:
      mcp-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: 7001
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    # SEC-010: connection pooler — session mode required for pg_advisory_lock (SEC-011 sync locks)
    # edoburu/pgbouncer reads /etc/pgbouncer/pgbouncer.ini and userlist.txt directly (no init override).
    image: edoburu/pgbouncer:latest
    volumes:
      - ./services/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./services/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres@pgbouncer:5432/datto_rmm  # SEC-010: via PgBouncer
      REDIS_URL: redis://redis:6379   # SEC-002: JWT revocation via JTI + Redis revocation set
    ports:
      - "127.0.0.1:5001:5001"  # dev only — loopback only, not 0.0.0.0
    networks:
      - internal
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    # Pinned to v1.82.3 (2026-03-19). To upgrade: check https://github.com/BerriAI/litellm/releases,
    # update this tag, rebuild (docker compose build litellm), smoke-test before deploying.
    image: ghcr.io/berriai/litellm:v1.82.3-stable
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    env_file: .env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres@pgbouncer:5432/litellm  # SEC-010: via PgBouncer
    ports:
      - "127.0.0.1:4000:4000"   # UI at http://localhost:4000/ui (dev only)
    networks:
      - internal
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: 6001
      DATABASE_URL: postgresql://postgres@pgbouncer:5432/datto_rmm  # SEC-010: via PgBouncer
      MCP_BRIDGE_URL: http://mcp-bridge:4001
      EMBEDDING_SERVICE_URL: http://embedding-service:7001
      LITELLM_URL: http://litellm:4000
      OLLAMA_URL: http://ollama:11434          # Stage 7: direct embed calls bypass LiteLLM
      AUTH_SERVICE_URL: http://auth-service:5001  # SEC-008: forced-revoke proxy
    ports:
      - "127.0.0.1:6001:6001"  # dev only — loopback only, not 0.0.0.0
    networks:
      - internal
    depends_on:
      pgbouncer:
        condition: service_healthy
      mcp-bridge:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # mcp-write: PLACEHOLDER — not yet implemented.
  # When write tools are added, build a separate mcp-write container here with its own
  # separately scoped Datto credentials (write-capable OAuth scope only). This preserves
  # the isolation guarantee: a compromised mcp-read container gives read-only Datto access,
  # a compromised mcp-write container gives write access only to the narrowly scoped actions.
  # mcp-write routes MUST go through the ActionProposal confirmation flow (015_action_proposals.sql)
  # before any write tool executes. Direct LLM → write execution is never permitted.
  #
  # mcp-write:
  #   build:
  #     context: ./write-mcp
  #     dockerfile: Dockerfile
  #   env_file: .env.write   # separate credentials file — never mix with read credentials
  #   environment:
  #     PORT: 3002
  #   networks:
  #     - internal

  redis:
    image: redis:7-alpine
    volumes:
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - internal

  web-app:
    build:
      context: ./services/web-app
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ""
      HOSTNAME: "0.0.0.0"
    networks:
      - public
    # internal network intentionally excluded: web-app must only reach APISIX (public).
    # All API calls go through the gateway — no direct access to postgres, redis, auth-service, ai-service, or etcd.

  etcd:
    # SECURITY: etcd has no authentication — ALLOW_NONE_AUTHENTICATION=yes is intentional for local dev.
    # etcd stores all APISIX route/plugin config including JWT validation rules and consumer definitions.
    # The only control is the internal Docker network boundary (etcd is not on the public network).
    # To harden for production: set ETCD_ROOT_PASSWORD and configure APISIX etcd.user/etcd.password in config.yaml.
    image: bitnamilegacy/etcd:3.5.11
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/opt/bitnami/etcd/bin/etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
    image: apache/apisix:3.9.0-debian
    ports:
      - "80:9080"
      - "127.0.0.1:9180:9180"
    volumes:
      - ./services/apisix/config.yaml:/usr/local/apisix/conf/config.yaml
    depends_on:
      etcd:
        condition: service_healthy
      auth-service:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - public
      - internal

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "127.0.0.1:9411:9411"
    networks:
      - internal

  apisix-dashboard:
    image: apache/apisix-dashboard:2.9.0
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - ./services/apisix/dashboard/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - internal

  # ── CVE Vulnerability Scanner ──────────────────────────────────────────────
  # Local NVD mirror — downloads CVE feeds, indexes them, and matches
  # against device software inventory. Runs in its own container.

  cve-scanner:
    build:
      context: ./cve-scanner
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: 8500
      DATABASE_URL: postgresql://postgres@pgbouncer:5432/datto_rmm
      NVD_CACHE_DIR: /app/nvd-cache
      SCAN_CRON: "0 4 * * *"
      MIN_CONFIDENCE: "0.70"
    volumes:
      - cve_cache:/app/nvd-cache
    networks:
      - internal
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8500/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Ollama — Local LLM Runtime ──────────────────────────────────────────────
  # Runs Qwen3 8B (synthesis) and nomic-embed-text (embeddings) locally.
  # SEC: internal network only — no port exposure, no external access.
  # Models are persisted in the ollama_data volume.
  # First start: models are pulled automatically by the entrypoint.

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  public:
  internal:
    driver: bridge

volumes:
  postgres_data:
  etcd_data:
  cve_cache:
  ollama_data:
